<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homefy Assistant — AI Chat</title>
  <meta name="description" content="Homefy AI Assistant — your smart society management chatbot" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="chat-wrapper">

    <!-- ── Header ──────────────────────────────── -->
    <header class="chat-header">
      <div class="header-left">
        <div class="avatar-wrap">
          <div class="bot-avatar">🏠</div>
          <span class="status-dot"></span>
        </div>
        <div class="header-info">
          <h1>Homefy Assistant</h1>
          <span class="header-sub" id="statusText">Online — ready to help</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Messages ────────────────────────────── -->
    <main class="chat-body" id="chatBody">

      <!-- Welcome card -->
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-icon">🏠</div>
        <h2>Hi! I'm your Homefy Assistant</h2>
        <p>I can help you with bookings, complaints, visitors, bills, and much more.</p>
        <div class="quick-chips">
          <button class="chip" onclick="sendQuick('I want to raise a complaint')">📝 Raise a Complaint</button>
          <button class="chip" onclick="sendQuick('I want to book an amenity')">🏊 Book Amenity</button>
          <button class="chip" onclick="sendQuick('Show my amenity bookings')">📅 My Bookings</button>
          <button class="chip" onclick="sendQuick('Show my complaints')">📋 My Complaints</button>
          <button class="chip" onclick="sendQuick('Show my bills')">💳 My Bills</button>
          <button class="chip" onclick="sendQuick('Show today visitors')">🚶 Visitors Today</button>
          <button class="chip" onclick="sendQuick('Any announcements?')">📢 Announcements</button>
          <button class="chip" onclick="sendQuick('Show my reward coins')">🪙 Rewards</button>
        </div>
      </div>

    </main>

    <!-- ── Typing indicator (hidden by default) ── -->
    <div class="typing-row" id="typingRow" style="display:none">
      <div class="bot-avatar-sm">🏠</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- ── Input ───────────────────────────────── -->
    <footer class="chat-footer">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Ask me anything about your society…"
          rows="1"
          maxlength="1000"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send (Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="footer-note">Powered by Groq · Homefy v1.0</p>
    </footer>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const SESSION_KEY = 'homefy_session_id';
    let sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);

    // ── DOM Elements ───────────────────────────────────────────────────────
    const chatBody   = document.getElementById('chatBody');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const typingRow  = document.getElementById('typingRow');
    const welcomeCard = document.getElementById('welcomeCard');
    const statusText = document.getElementById('statusText');

    let isSending = false;

    // ── Helpers ────────────────────────────────────────────────────────────
    function getTimestamp() {
      return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function scrollToBottom(smooth = true) {
      chatBody.scrollTo({
        top: chatBody.scrollHeight,
        behavior: smooth ? 'smooth' : 'instant'
      });
    }

    function hideWelcome() {
      if (welcomeCard && welcomeCard.style.display !== 'none') {
        welcomeCard.style.opacity = '0';
        welcomeCard.style.transform = 'translateY(-10px)';
        setTimeout(() => { welcomeCard.style.display = 'none'; }, 300);
      }
    }

    function appendMessage(role, text) {
      // ── Complaint Form Detection ──────────────────────────────────
      if (role === 'bot' && text.startsWith('__COMPLAINT_FORM_MARKER__')) {
        let isAdmin = false;
        if (text.includes('|')) {
          try {
            const payload = JSON.parse(text.split('|')[1]);
            isAdmin = payload.isAdmin;
          } catch(e) {}
        }
        renderComplaintForm(isAdmin);
        return;
      }
      // ── Amenity Form Detection ──────────────────────────────────
      if (role === 'bot' && text.trim() === '__AMENITY_FORM_MARKER__') {
        renderAmenityForm();
        return;
      }
      // ── Bill Form Detection ──────────────────────────────────
      if (role === 'bot' && text.trim() === '__BILL_FORM_MARKER__') {
        renderBillForm();
        return;
      }
      // ── Apartment Selection Detection ──────────────────────────────────
      if (role === 'bot' && text.startsWith('__APARTMENT_SELECTION_MARKER__|')) {
        try {
          const payload = JSON.parse(text.split('|')[1]);
          renderApartmentSelection(payload);
        } catch (e) {
          console.error("Failed to parse apartment selection marker", e);
        }
        return;
      }
      
      // ── Flat Selection Detection ──────────────────────────────────
      if (role === 'bot' && text.startsWith('__FLAT_SELECTION_MARKER__|')) {
        try {
          const payload = JSON.parse(text.split('|')[1]);
          renderFlatSelection(payload);
        } catch (e) {
          console.error("Failed to parse flat selection marker", e);
        }
        return;
      }

      // ── Role Selection Detection ──────────────────────────────────
      if (role === 'bot' && text.startsWith('__ROLE_SELECTION_MARKER__|')) {
        try {
          const payload = JSON.parse(text.split('|')[1]);
          renderRoleSelection(payload);
        } catch (e) {
          console.error("Failed to parse role selection marker", e);
        }
        return;
      }

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatText(text);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();

      if (role === 'bot') {
        const av = document.createElement('div');
        av.className = 'bot-avatar-sm';
        av.textContent = '🏠';
        row.appendChild(av);
      }

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';
      inner.appendChild(bubble);
      inner.appendChild(meta);
      row.appendChild(inner);

      // Animate in
      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
    }

    function formatText(text) {
      // Basic markdown: bold, bullet lists, line breaks
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^• (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n/g, '<br/>');
    }

    function setStatus(text, color) {
      statusText.textContent = text;
      statusText.style.color = color || '';
    }

    // ── Apartment Selection Form Logic ──────────────────────────────────────
    function renderApartmentSelection(apartments) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.width = '100%';
      
      const title = document.createElement('p');
      title.innerHTML = '<strong>✅ OTP verified!</strong><br/>You are associated with multiple apartments. Please select your apartment to continue:';
      title.style.marginBottom = '12px';
      bubble.appendChild(title);

      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'quick-chips';
      chipsContainer.style.marginTop = '0';
      chipsContainer.style.gap = '8px';
      
      apartments.forEach(apt => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.innerHTML = `🏢 ${apt.label}`;
        btn.onclick = () => {
          const allChips = chipsContainer.querySelectorAll('.chip');
          allChips.forEach(c => c.disabled = true);
          // Pass the friendly label for the UI, but the apt.id for the backend
          sendMessage(apt.label, apt.id);
        };
        chipsContainer.appendChild(btn);
      });

      bubble.appendChild(chipsContainer);
      inner.appendChild(bubble);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);

      row.appendChild(inner);

      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
    }

    // ── Role Selection Form Logic ───────────────────────────────────────────
    function renderRoleSelection(roles) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.width = '100%';
      
      const title = document.createElement('p');
      title.innerHTML = '<strong>Account Type</strong><br/>Please select a role to continue:';
      title.style.marginBottom = '12px';
      bubble.appendChild(title);

      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'quick-chips';
      chipsContainer.style.marginTop = '0';
      chipsContainer.style.gap = '8px';
      
      roles.forEach(roleData => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.innerHTML = `${roleData.label}`;
        btn.onclick = () => {
          const allChips = chipsContainer.querySelectorAll('.chip');
          allChips.forEach(c => c.disabled = true);
          sendMessage(roleData.label, roleData.id);
        };
        chipsContainer.appendChild(btn);
      });

      bubble.appendChild(chipsContainer);
      inner.appendChild(bubble);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);

      row.appendChild(inner);

      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
    }

    // ── Flat Selection Form Logic ──────────────────────────────────────────
    function renderFlatSelection(flats) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.width = '100%';
      
      const title = document.createElement('p');
      title.innerHTML = '<strong>Please select your flat to continue:</strong>';
      title.style.marginBottom = '12px';
      bubble.appendChild(title);

      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'quick-chips';
      chipsContainer.style.marginTop = '0';
      chipsContainer.style.gap = '8px';
      
      flats.forEach(flat => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.innerHTML = `🏢 ${flat.label} <span style="opacity:0.7;font-size:0.85em">(${flat.role})</span>`;
        btn.onclick = () => {
          const allChips = chipsContainer.querySelectorAll('.chip');
          allChips.forEach(c => c.disabled = true);
          // Pass the friendly label for the UI, but the flat.id for the backend
          sendMessage(flat.label, flat.id);
        };
        chipsContainer.appendChild(btn);
      });

      bubble.appendChild(chipsContainer);
      inner.appendChild(bubble);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);

      row.appendChild(inner);

      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
    }

    // ── Send message ───────────────────────────────────────────────────────
    async function sendMessage(text, hiddenPayload) {
      const displayMsg = (text || userInput.value).trim();
      const sendMsg = hiddenPayload || displayMsg;
      
      if (!displayMsg || isSending) return;

      isSending = true;
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      hideWelcome();

      appendMessage('user', displayMsg);

      // Show typing indicator
      typingRow.style.display = 'flex';
      chatBody.appendChild(typingRow);
      scrollToBottom();
      setStatus('Typing…', '#a78bfa');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            message: sendMsg,
            session_id: sessionId,
          })
        });

        typingRow.style.display = 'none';

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          appendMessage('bot', '⚠️ ' + (err.error || 'Something went wrong. Please try again.'));
          setStatus('Error — try again', '#f87171');
          return;
        }

        const data = await res.json();
        sessionId = data.session_id || sessionId;
        localStorage.setItem(SESSION_KEY, sessionId);

        appendMessage('bot', data.reply || '(no response)');
        setStatus('Online — ready to help', '');

      } catch (e) {
        typingRow.style.display = 'none';
        appendMessage('bot', '⚠️ Network error. Please check your connection.');
        setStatus('Offline', '#f87171');
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function sendQuick(text) {
      userInput.value = text;
      sendMessage(text);
    }

    // ── Clear chat ─────────────────────────────────────────────────────────
    document.getElementById('clearBtn').addEventListener('click', async () => {
      await fetch('/api/chat/reset', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: sessionId})
      }).catch(() => {});
      sessionId = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sessionId);
      // Remove all messages except welcome card
      [...chatBody.querySelectorAll('.msg-row')].forEach(el => el.remove());
      if (welcomeCard) {
        welcomeCard.style.display = '';
        welcomeCard.style.opacity = '1';
        welcomeCard.style.transform = '';
      }
    });

    // ── Input events ───────────────────────────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => sendMessage());

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // ── Complaint Form Logic ────────────────────────────────────────
    function renderComplaintForm(isAdmin = false) {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'complaintFormRow';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';
      inner.style.maxWidth = '92%';

      const personalOption = isAdmin ? '' : `
              <label class="cform-radio">
                <input type="radio" name="cfType" value="PERSONAL" checked />
                <span>🏠 Personal (Flat)</span>
              </label>
      `;

      const communityChecked = isAdmin ? 'checked' : '';

      const card = document.createElement('div');
      card.className = 'complaint-form-card';
      card.innerHTML = `
        <div class="complaint-form-header">
          <span class="form-icon">📋</span>
          <span>Fill in the details to raise your complaint</span>
        </div>
        <div class="complaint-form-body">

          <div class="cform-group" id="cfgCategory">
            <label class="cform-label">Category <span class="required">*</span></label>
            <select class="cform-select" id="cfCategory">
              <option value="" disabled selected>Loading categories...</option>
            </select>
            <div class="cform-error">Please select a category</div>
          </div>

          <div class="cform-group" id="cfgType">
            <label class="cform-label">Complaint Type <span class="required">*</span></label>
            <div class="cform-radio-group">
              ${personalOption}
              <label class="cform-radio">
                <input type="radio" name="cfType" value="COMMUNITY" ${communityChecked} />
                <span>🏘️ Community (Common)</span>
              </label>
            </div>
          </div>

          <div class="cform-group" id="cfgUrgency">
            <label class="cform-label">Is it urgent? <span class="required">*</span></label>
            <div class="cform-radio-group">
              <label class="cform-radio">
                <input type="radio" name="cfUrgent" value="false" checked />
                <span>No</span>
              </label>
              <label class="cform-radio">
                <input type="radio" name="cfUrgent" value="true" />
                <span>🚨 Yes, Urgent</span>
              </label>
            </div>
          </div>

          <div class="cform-group" id="cfgDesc">
            <label class="cform-label">Description <span class="required">*</span></label>
            <textarea class="cform-textarea" id="cfDescription" placeholder="Describe the issue in detail..."></textarea>
            <div class="cform-error">Please describe the issue</div>
          </div>

          <div class="cform-group" id="cfgLocation">
            <label class="cform-label">Location <span style="color:var(--muted);font-weight:400;font-size:12px">(optional)</span></label>
            <input type="text" class="cform-input" id="cfLocation" placeholder="e.g., Kitchen, Lobby, Block A parking" />
          </div>

          <div class="cform-actions">
            <button class="cform-submit" id="cfSubmitBtn" onclick="submitComplaintForm()">
              <span class="spinner"></span>
              <span class="btn-text">Submit Complaint</span>
            </button>
            <button class="cform-cancel" onclick="cancelComplaintForm()">Cancel</button>
          </div>

        </div>
      `;

      inner.appendChild(card);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);

      row.appendChild(inner);

      // Animate in
      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
      loadFormCategories();
    }

    async function loadFormCategories() {
      const sel = document.getElementById('cfCategory');
      if (!sel) return;
      try {
        const res = await fetch(`/api/complaints/categories?session_id=${encodeURIComponent(sessionId)}`);
        const data = await res.json();
        const cats = data.categories || [];
        sel.innerHTML = '<option value="" disabled selected>Select category...</option>';
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch {
        sel.innerHTML = '<option value="" disabled selected>Failed to load categories</option>';
      }
    }

    async function submitComplaintForm() {
      // Validate
      let valid = true;
      const catGroup = document.getElementById('cfgCategory');
      const descGroup = document.getElementById('cfgDesc');
      const catVal = document.getElementById('cfCategory').value;
      const descVal = document.getElementById('cfDescription').value.trim();

      catGroup.classList.toggle('has-error', !catVal);
      descGroup.classList.toggle('has-error', !descVal);
      if (!catVal || !descVal) return;

      const typeVal = document.querySelector('input[name="cfType"]:checked')?.value || 'PERSONAL';
      const urgentVal = document.querySelector('input[name="cfUrgent"]:checked')?.value === 'true';
      const locVal = document.getElementById('cfLocation').value.trim();

      const btn = document.getElementById('cfSubmitBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/complaints/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            category_id: catVal,
            type: typeVal,
            is_urgent: urgentVal,
            description: descVal,
            location: locVal
          })
        });

        const data = await res.json();

        // Remove the form
        const formRow = document.getElementById('complaintFormRow');
        if (formRow) formRow.remove();

        if (data.status === 'success') {
          appendMessage('bot', `✅ **Complaint raised successfully!**\n\n${data.message}\n\nYou can view this complaint in the Homefy app under **My Complaints**.`);
        } else {
          appendMessage('bot', `⚠️ ${data.error || data.message || 'Failed to raise complaint. Please try again.'}`);
        }
      } catch (e) {
        const formRow = document.getElementById('complaintFormRow');
        if (formRow) formRow.remove();
        appendMessage('bot', '⚠️ Network error while raising complaint. Please check your connection and try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function cancelComplaintForm() {
      const formRow = document.getElementById('complaintFormRow');
      if (formRow) {
        formRow.style.transition = 'all 0.3s ease';
        formRow.style.opacity = '0';
        formRow.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          formRow.remove();
          appendMessage('bot', 'Complaint form cancelled. How else can I help you?');
        }, 300);
      }
    }

    // ── Amenity Booking Form Logic ────────────────────────────────────
    function renderAmenityForm() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'amenityFormRow';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';
      inner.style.maxWidth = '92%';

      const card = document.createElement('div');
      card.className = 'complaint-form-card';
      card.innerHTML = `
        <div class="complaint-form-header">
          <span class="form-icon">🏊</span>
          <span>Book an Amenity</span>
        </div>
        <div class="complaint-form-body">

          <!-- Category removed to display all amenities instantly -->

          <div class="cform-group" id="afgAmenity">
            <label class="cform-label">Amenity <span class="required">*</span></label>
            <select class="cform-select" id="afAmenity" onchange="loadAmenitySlots()">
              <option value="" disabled selected>Loading amenities...</option>
            </select>
            <div class="cform-error">Please select an amenity</div>
          </div>

          <div class="cform-group" id="afgDate">
            <label class="cform-label">Date <span class="required">*</span></label>
            <input type="date" class="cform-input" id="afDate" onchange="loadAmenitySlots()" min="${new Date().toISOString().split('T')[0]}" />
            <div class="cform-error">Please select a date</div>
          </div>

          <div class="cform-group" id="afgSlots" style="display:none">
            <label class="cform-label">Available Slots <span class="required">*</span></label>
            <div id="afSlotsContainer" class="slots-grid"></div>
            <div class="cform-error">Please select at least one slot</div>
          </div>

          <div id="afLoadingSlots" style="display:none;color:var(--muted);font-size:13px;padding:8px 0">⏳ Loading available slots...</div>
          <div id="afNoSlots" style="display:none;color:#f87171;font-size:13px;padding:8px 0">❌ No slots available for this date.</div>

          <div class="cform-actions">
            <button class="cform-cancel" onclick="cancelAmenityForm()">Cancel</button>
          </div>

        </div>
      `;

      inner.appendChild(card);
      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);
      row.appendChild(inner);

      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);
      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });
      scrollToBottom();
      loadAmenityData();
    }


    // ── Booking state ─────────────────────────────────────────────────
    let _allAmenities = [];
    let _selectedSlotId = null;
    let _selectedAmenityId = null;
    let _blocksData = [];

    async function loadAmenityData() {
      const amenSel = document.getElementById('afAmenity');
      if (!amenSel) return;
      try {
        const amenRes = await fetch(`/api/amenities/list?session_id=${encodeURIComponent(sessionId)}`);
        const amenData = await amenRes.json();

        _allAmenities = amenData.amenities || [];

        amenSel.innerHTML = '<option value="" disabled selected>Select an amenity...</option>';
        _allAmenities.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.id;
          opt.textContent = a.name + (a.location ? ` (${a.location})` : '');
          amenSel.appendChild(opt);
        });
      } catch {
        amenSel.innerHTML = '<option value="" disabled selected>Failed to load</option>';
      }
    }

    // ── Slot click → Block/Flat modal ────────────────────────────────
    function openBlockFlatModal(slotId, amenityId) {
      _selectedSlotId = slotId;
      _selectedAmenityId = amenityId;
      document.getElementById('bfModal').style.display = 'flex';
      const blockSel = document.getElementById('bfBlockSel');
      const flatSel = document.getElementById('bfFlatSel');
      blockSel.innerHTML = '<option value="" disabled selected>Loading blocks...</option>';
      flatSel.innerHTML = '<option value="" disabled selected>Select block first...</option>';
      flatSel.disabled = true;
      document.getElementById('bfNextBtn').disabled = true;

      fetch(`/api/apartment/blocks-flats?session_id=${encodeURIComponent(sessionId)}`)
        .then(r => r.json())
        .then(data => {
          _blocksData = data.blocks || [];
          blockSel.innerHTML = '<option value="" disabled selected>Select block...</option>';
          _blocksData.forEach((b, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = b.blockName;
            blockSel.appendChild(opt);
          });
        })
        .catch(() => {
          blockSel.innerHTML = '<option value="" disabled selected>Failed to load</option>';
        });
    }

    function onBlockChange() {
      const blockSel = document.getElementById('bfBlockSel');
      const flatSel = document.getElementById('bfFlatSel');
      const idx = blockSel.value;
      document.getElementById('bfNextBtn').disabled = true;
      if (idx === '' || !_blocksData.length) return;
      const block = _blocksData[parseInt(idx)];
      flatSel.innerHTML = '<option value="" disabled selected>Select flat...</option>';
      (block.flats || []).forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.flatId || f.requestId;
        opt.textContent = f.flatNumber || '(unknown)';
        flatSel.appendChild(opt);
      });
      flatSel.disabled = false;
    }

    function onFlatChange() {
      const flatSel = document.getElementById('bfFlatSel');
      document.getElementById('bfNextBtn').disabled = !flatSel.value;
    }

    function closeBlockFlatModal() {
      document.getElementById('bfModal').style.display = 'none';
    }

    function proceedToConfirm() {
      const flatSel = document.getElementById('bfFlatSel');
      if (!flatSel.value) return;
      document.getElementById('bfModal').style.display = 'none';
      document.getElementById('confirmModal').style.display = 'flex';
      document.getElementById('confirmModal').dataset.flatId = flatSel.value;
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').style.display = 'none';
      document.getElementById('bfModal').style.display = 'flex';
    }

    function cancelBookingFlow() {
      document.getElementById('confirmModal').style.display = 'none';
      document.getElementById('bfModal').style.display = 'none';
    }

    async function confirmBooking() {
      const flatId = document.getElementById('confirmModal').dataset.flatId || '';
      const confirmBtn = document.getElementById('confirmYesBtn');
      confirmBtn.textContent = 'Booking...';
      confirmBtn.disabled = true;
      try {
        const res = await fetch('/api/amenities/book', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id: sessionId,
            amenity_id: _selectedAmenityId,
            slot_ids: [_selectedSlotId],
            flat_id: flatId
          })
        });
        const data = await res.json();
        document.getElementById('confirmModal').style.display = 'none';
        const formRow = document.getElementById('amenityFormRow');
        if (formRow) formRow.remove();
        if (data.status === 'success') {
          appendMessage('bot', `✅ **Amenity booked successfully!**\n\nYour booking is confirmed. You can view it in the Homefy app under **My Bookings**.`);
        } else {
          appendMessage('bot', `⚠️ ${data.message || data.error || 'Booking failed. Please try again.'}`);
        }
      } catch {
        document.getElementById('confirmModal').style.display = 'none';
        appendMessage('bot', '⚠️ Network error while booking. Please check your connection.');
      } finally {
        confirmBtn.textContent = 'Yes';
        confirmBtn.disabled = false;
      }
    }




    async function loadAmenitySlots() {
      const amenId = document.getElementById('afAmenity')?.value;
      const date = document.getElementById('afDate')?.value;
      const slotsContainer = document.getElementById('afSlotsContainer');
      const loadingEl = document.getElementById('afLoadingSlots');
      const noSlotsEl = document.getElementById('afNoSlots');
      const slotsGroup = document.getElementById('afgSlots');

      if (!amenId || !date) return;

      slotsGroup.style.display = 'none';
      loadingEl.style.display = 'block';
      noSlotsEl.style.display = 'none';
      slotsContainer.innerHTML = '';

      try {
        const res = await fetch('/api/amenities/slots', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id: sessionId,
            amenity_id: amenId,
            start_date: date,
            end_date: date
          })
        });
        const data = await res.json();
        loadingEl.style.display = 'none';

        const slots = data.slots || [];
        if (slots.length === 0) {
          noSlotsEl.style.display = 'block';
          return;
        }

        slotsGroup.style.display = 'block';
        slots.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'slot-pill';
          btn.textContent = `${s.startTime} - ${s.endTime}`;
          if (s.isBooked) {
            btn.classList.add('booked');
            btn.disabled = true;
          } else {
            btn.onclick = () => openBlockFlatModal(s.id, amenId);
          }
          slotsContainer.appendChild(btn);
        });
      } catch (e) {
        loadingEl.style.display = 'none';
        noSlotsEl.style.display = 'block';
        noSlotsEl.textContent = '⚠️ Failed to load slots. Please try again.';
      }
    }

    function cancelAmenityForm() {
      const formRow = document.getElementById('amenityFormRow');
      if (formRow) {
        formRow.style.transition = 'all 0.3s ease';
        formRow.style.opacity = '0';
        formRow.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          formRow.remove();
          appendMessage('bot', 'Booking cancelled. How else can I help you?');
        }, 300);
      }
    }

    // ── Individual Bill Form Logic ────────────────────────────────────
    function renderBillForm() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'billFormRow';

      const av = document.createElement('div');
      av.className = 'bot-avatar-sm';
      av.textContent = '🏠';
      row.appendChild(av);

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';
      inner.style.maxWidth = '92%';

      const card = document.createElement('div');
      card.className = 'complaint-form-card';
      card.innerHTML = `
        <div class="complaint-form-header">
          <span class="form-icon">💳</span>
          <span>Individual Bill Entry</span>
        </div>
        <div class="complaint-form-body">

          <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Total Bill Amount <span class="required">*</span></label>
              <input type="number" step="0.01" class="cform-input" id="bfAmount" placeholder="e.g. 500.00" />
            </div>
            <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Bill Category <span class="required">*</span></label>
              <select class="cform-select" id="bfCategory">
                <option value="" disabled selected>Loading...</option>
              </select>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-bottom: 12px;">
             <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Select Blocks <span class="required">*</span></label>
              <select class="cform-select" id="bfBlocks" onchange="onBillBlockChange()">
                <option value="" disabled selected>Loading...</option>
              </select>
            </div>
            <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Select Flats <span class="required">*</span></label>
              <select class="cform-select" id="bfFlats" disabled>
                <option value="" disabled selected>Select block first...</option>
              </select>
            </div>
          </div>

          <div style="display: flex; gap: 10px; margin-bottom: 12px;">
            <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Last Date <span class="required">*</span></label>
              <input type="date" class="cform-input" id="bfDate" />
            </div>
            <div class="cform-group" style="flex:1; margin-bottom: 0;">
              <label class="cform-label">Bill Created For <span class="required">*</span></label>
              <select class="cform-select" id="bfApplicableTo">
                <option value="OWNER_AND_TENANT" selected>Owner & Tenant</option>
                <option value="OWNER">Owner</option>
                <option value="TENANT">Tenant</option>
              </select>
            </div>
          </div>

          <div class="cform-group">
            <label class="cform-label">Notes</label>
            <textarea class="cform-textarea" id="bfNotes" placeholder="Additional details..." rows="3"></textarea>
          </div>

          <div class="cform-actions">
             <button class="cform-submit" id="bfSubmitBtn" onclick="submitBillForm()">
              <span class="spinner"></span>
              <span class="btn-text">Submit</span>
            </button>
            <button class="cform-cancel" onclick="cancelBillForm()">Cancel</button>
          </div>
        </div>
      `;

      inner.appendChild(card);
      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();
      inner.appendChild(meta);
      row.appendChild(inner);

      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);
      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });
      scrollToBottom();
      loadBillFormData();
    }

    let _billBlocksData = [];

    async function loadBillFormData() {
      const catSel = document.getElementById('bfCategory');
      fetch(`/api/finance/bill-categories?session_id=${encodeURIComponent(sessionId)}`)
        .then(r => r.json())
        .then(data => {
          catSel.innerHTML = '<option value="" disabled selected>Select Category...</option>';
          (data.categories || []).forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            catSel.appendChild(opt);
          });
        });

      const blockSel = document.getElementById('bfBlocks');
      fetch(`/api/apartment/blocks-flats?session_id=${encodeURIComponent(sessionId)}`)
        .then(r => r.json())
        .then(data => {
          _billBlocksData = data.blocks || [];
          blockSel.innerHTML = '<option value="" disabled selected>Select Block...</option>';
          _billBlocksData.forEach((b, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = b.blockName;
            blockSel.appendChild(opt);
          });
        });
    }

    function onBillBlockChange() {
      const idx = document.getElementById('bfBlocks').value;
      const flatSel = document.getElementById('bfFlats');
      if (idx === '' || !_billBlocksData.length) return;
      
      const block = _billBlocksData[parseInt(idx)];
      flatSel.innerHTML = '<option value="" disabled selected>Select Flat...</option>';
      (block.flats || []).forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.flatId || f.requestId;
        opt.textContent = f.flatNumber || '(unknown)';
        flatSel.appendChild(opt);
      });
      flatSel.disabled = false;
    }

    function cancelBillForm() {
      const formRow = document.getElementById('billFormRow');
      if (formRow) formRow.remove();
      appendMessage('bot', 'Bill creation cancelled.');
    }

    async function submitBillForm() {
      const amount = document.getElementById('bfAmount').value;
      const cat = document.getElementById('bfCategory').value;
      const flat = document.getElementById('bfFlats').value;
      const date = document.getElementById('bfDate').value;
      const appTo = document.getElementById('bfApplicableTo').value;
      const notes = document.getElementById('bfNotes').value;

      if (!amount || !cat || !flat || !date) {
        alert("Please fill out all required fields.");
        return;
      }

      const btn = document.getElementById('bfSubmitBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/bills/create', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            session_id: sessionId,
            amount,
            category_id: cat,
            flat_id: flat,
            last_date: date,
            applicable_to: appTo,
            notes
          })
        });
        const data = await res.json();
        const formRow = document.getElementById('billFormRow');
        if (formRow) formRow.remove();

        if (data.status === 'success') {
          appendMessage('bot', `✅ **Bill Created Successfully!**\n\n${data.message}`);
        } else {
          appendMessage('bot', `⚠️ ${data.error || data.message || 'Failed to create bill.'}`);
        }
      } catch (e) {
        const formRow = document.getElementById('billFormRow');
        if (formRow) formRow.remove();
        appendMessage('bot', '⚠️ Network error while creating the bill.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    userInput.focus();
  </script>

  <!-- ── Block/Flat Selection Modal ──────────────────────────────────── -->
  <div id="bfModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--surface,#1e1e2e);border-radius:16px;padding:28px;width:min(440px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="margin:0;font-size:1.1rem;font-weight:600;">Select Block and Flat</h3>
        <button onclick="closeBlockFlatModal()" style="background:none;border:none;color:var(--muted,#888);font-size:1.4rem;cursor:pointer;line-height:1;">&times;</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <div>
          <label style="font-size:12px;color:var(--muted,#888);display:block;margin-bottom:6px;">Block</label>
          <select id="bfBlockSel" class="cform-select" onchange="onBlockChange()">
            <option value="" disabled selected>Block</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;color:var(--muted,#888);display:block;margin-bottom:6px;">Flat</label>
          <select id="bfFlatSel" class="cform-select" onchange="onFlatChange()" disabled>
            <option value="" disabled selected>Flat</option>
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closeBlockFlatModal()" class="cform-cancel" style="margin:0;">Cancel</button>
        <button id="bfNextBtn" onclick="proceedToConfirm()" class="cform-submit" style="margin:0;padding:10px 24px;" disabled>
          <span class="btn-text">Next</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Confirm Booking Modal ───────────────────────────────────────── -->
  <div id="confirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1001;align-items:center;justify-content:center;">
    <div style="background:var(--surface,#1e1e2e);border-radius:16px;padding:28px;width:min(380px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="margin:0;font-size:1.1rem;font-weight:600;">Confirm Booking</h3>
        <button onclick="cancelBookingFlow()" style="background:none;border:none;color:var(--muted,#888);font-size:1.4rem;cursor:pointer;line-height:1;">&times;</button>
      </div>
      <p style="margin:0 0 24px;color:var(--muted,#aaa);font-size:0.95rem;">Are you sure you want to book this slot?</p>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="cancelBookingFlow()" class="cform-cancel" style="margin:0;">Cancel</button>
        <button onclick="closeConfirmModal()" class="cform-cancel" style="margin:0;">Prev</button>
        <button id="confirmYesBtn" onclick="confirmBooking()" class="cform-submit" style="margin:0;padding:10px 24px;">
          <span class="btn-text">Yes</span>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
