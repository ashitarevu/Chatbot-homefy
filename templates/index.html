<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homefy Assistant — AI Chat</title>
  <meta name="description" content="Homefy AI Assistant — your smart society management chatbot" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="chat-wrapper">

    <!-- ── Header ──────────────────────────────── -->
    <header class="chat-header">
      <div class="header-left">
        <div class="avatar-wrap">
          <div class="bot-avatar">🏠</div>
          <span class="status-dot"></span>
        </div>
        <div class="header-info">
          <h1>Homefy Assistant</h1>
          <span class="header-sub" id="statusText">Online — ready to help</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Messages ────────────────────────────── -->
    <main class="chat-body" id="chatBody">

      <!-- Welcome card -->
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-icon">🏠</div>
        <h2>Hi! I'm your Homefy Assistant</h2>
        <p>I can help you with bookings, complaints, visitors, bills, and much more.</p>
        <div class="quick-chips">
          <button class="chip" onclick="sendQuick('Show my amenity bookings')">🏊 Amenity Bookings</button>
          <button class="chip" onclick="sendQuick('Show my complaints')">📋 My Complaints</button>
          <button class="chip" onclick="sendQuick('Show my bills')">💳 My Bills</button>
          <button class="chip" onclick="sendQuick('Show today visitors')">🚶 Visitors Today</button>
          <button class="chip" onclick="sendQuick('Any announcements?')">📢 Announcements</button>
          <button class="chip" onclick="sendQuick('Show my reward coins')">🪙 Rewards</button>
        </div>
      </div>

    </main>

    <!-- ── Typing indicator (hidden by default) ── -->
    <div class="typing-row" id="typingRow" style="display:none">
      <div class="bot-avatar-sm">🏠</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- ── Input ───────────────────────────────── -->
    <footer class="chat-footer">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Ask me anything about your society…"
          rows="1"
          maxlength="1000"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send (Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="footer-note">Powered by Groq · Homefy v1.0</p>
    </footer>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const SESSION_KEY = 'homefy_session_id';
    let sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);

    // ── DOM Elements ───────────────────────────────────────────────────────
    const chatBody   = document.getElementById('chatBody');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const typingRow  = document.getElementById('typingRow');
    const welcomeCard = document.getElementById('welcomeCard');
    const statusText = document.getElementById('statusText');

    let isSending = false;

    // ── Helpers ────────────────────────────────────────────────────────────
    function getTimestamp() {
      return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function scrollToBottom(smooth = true) {
      chatBody.scrollTo({
        top: chatBody.scrollHeight,
        behavior: smooth ? 'smooth' : 'instant'
      });
    }

    function hideWelcome() {
      if (welcomeCard && welcomeCard.style.display !== 'none') {
        welcomeCard.style.opacity = '0';
        welcomeCard.style.transform = 'translateY(-10px)';
        setTimeout(() => { welcomeCard.style.display = 'none'; }, 300);
      }
    }

    function appendMessage(role, text) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatText(text);

      const meta = document.createElement('span');
      meta.className = 'msg-meta';
      meta.textContent = getTimestamp();

      if (role === 'bot') {
        const av = document.createElement('div');
        av.className = 'bot-avatar-sm';
        av.textContent = '🏠';
        row.appendChild(av);
      }

      const inner = document.createElement('div');
      inner.className = 'bubble-wrap';
      inner.appendChild(bubble);
      inner.appendChild(meta);
      row.appendChild(inner);

      // Animate in
      row.style.opacity = '0';
      row.style.transform = 'translateY(12px)';
      chatBody.appendChild(row);

      requestAnimationFrame(() => {
        row.style.transition = 'all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        row.style.opacity = '1';
        row.style.transform = 'translateY(0)';
      });

      scrollToBottom();
    }

    function formatText(text) {
      // Basic markdown: bold, bullet lists, line breaks
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^• (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n/g, '<br/>');
    }

    function setStatus(text, color) {
      statusText.textContent = text;
      statusText.style.color = color || '';
    }

    // ── Send message ───────────────────────────────────────────────────────
    async function sendMessage(text) {
      const msg = (text || userInput.value).trim();
      if (!msg || isSending) return;

      isSending = true;
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      hideWelcome();

      appendMessage('user', msg);

      // Show typing indicator
      typingRow.style.display = 'flex';
      chatBody.appendChild(typingRow);
      scrollToBottom();
      setStatus('Typing…', '#a78bfa');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            message: msg,
            session_id: sessionId,
          })
        });

        typingRow.style.display = 'none';

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          appendMessage('bot', '⚠️ ' + (err.error || 'Something went wrong. Please try again.'));
          setStatus('Error — try again', '#f87171');
          return;
        }

        const data = await res.json();
        sessionId = data.session_id || sessionId;
        localStorage.setItem(SESSION_KEY, sessionId);

        appendMessage('bot', data.reply || '(no response)');
        setStatus('Online — ready to help', '');

      } catch (e) {
        typingRow.style.display = 'none';
        appendMessage('bot', '⚠️ Network error. Please check your connection.');
        setStatus('Offline', '#f87171');
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function sendQuick(text) {
      userInput.value = text;
      sendMessage(text);
    }

    // ── Clear chat ─────────────────────────────────────────────────────────
    document.getElementById('clearBtn').addEventListener('click', async () => {
      await fetch('/api/chat/reset', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: sessionId})
      }).catch(() => {});
      sessionId = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sessionId);
      // Remove all messages except welcome card
      [...chatBody.querySelectorAll('.msg-row')].forEach(el => el.remove());
      if (welcomeCard) {
        welcomeCard.style.display = '';
        welcomeCard.style.opacity = '1';
        welcomeCard.style.transform = '';
      }
    });

    // ── Input events ───────────────────────────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => sendMessage());

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    userInput.focus();
  </script>
</body>
</html>
