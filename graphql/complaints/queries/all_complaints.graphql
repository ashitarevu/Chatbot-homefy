query AllComplaints($filter: ComplaintFilterInput!) {
        allComplaints(filter: $filter) {
            data {
                id
                complaintId
                status
                isUrgent
                createdAt
                category {
                    name
                }
                createdBy {
                    id
                    user {
                        firstName
                        lastName
                    }
                    flat {
                        flatNumber
                        block {
                            blockName
                        }
                    }
                    roleType
                }
                assignee {
                    id
                    user {
                        firstName
                        lastName
                    }
                    flat {
                        flatNumber
                        block {
                            blockName
                        }
                    }
                    roleType
                }
            }
            hasNext
        }
    }